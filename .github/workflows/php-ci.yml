name: PHP CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.3 with Xdebug
        run: |
          sudo apt-get update
          sudo apt-get install -y php8.3 php8.3-cli php8.3-xdebug php8.3-mbstring php8.3-xml php8.3-curl php8.3-zip unzip curl
          sudo bash -c "echo 'zend_extension=xdebug.so' > /etc/php/8.3/cli/conf.d/20-xdebug.ini"
          sudo bash -c "echo 'xdebug.mode=coverage' >> /etc/php/8.3/cli/conf.d/20-xdebug.ini"
          php -v
          php -m | grep xdebug
      
      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer | php
          sudo mv composer.phar /usr/local/bin/composer
          composer --version

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run linter
        run: make lint

      - name: Run tests with coverage
        run: make test-coverage
        env:
          XDEBUG_MODE: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io